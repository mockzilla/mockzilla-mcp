name: publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC token for npm Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted Publishing landed in npm 11.5.1; setup-node ships an
      # older npm. Use corepack rather than `npm install -g npm@latest`
      # because the latter occasionally leaves npm in a half-installed
      # state where transitive deps go missing (e.g. promise-retry).
      - run: |
          corepack enable
          corepack prepare npm@latest --activate
          npm --version

      - name: Debug OIDC claims (TEMP — remove after publish works)
        run: |
          curl -sLS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" \
          | node -e '
            const t = JSON.parse(require("fs").readFileSync(0, "utf8")).value;
            const p = t.split(".")[1];
            const json = Buffer.from(p, "base64url").toString("utf8");
            console.log(JSON.stringify(JSON.parse(json), null, 2));
          '

      - name: Verify release tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "release tag $GITHUB_REF_NAME (=$tag) != package.json version $pkg" >&2
            exit 1
          fi

      - run: npm publish --provenance --access public
